<div class="d-flex flex-column">
  @for (opt of (menuOptions$ | async); track $index;) {
    <hr>
    <div class="d-flex align-content-center ms-2">
      <mat-icon class="mt-1">{{ opt.icon }}</mat-icon>
      <a class="m-1 ps-1 base-font" [routerLink]="opt.url" (click)="linkClicked.emit()">{{ opt.name }}</a>
    </div>
  }
  <hr>
  <div class="d-flex align-content-center ms-2 section-start">
    <mat-icon class="mt-1">info</mat-icon>
    <a class="m-1 ps-1 base-font" [routerLink]="'/about'" (click)="linkClicked.emit()">About Us</a>
  </div>
  <hr>
  <div class="d-flex align-content-center ms-2">
    <mat-icon class="mt-1">chat_bubble_outline</mat-icon>
    <a class="m-1 ps-1 base-font" [routerLink]="'/contact'" (click)="linkClicked.emit()">Contact Us</a>
  </div>
  <hr>
</div>
